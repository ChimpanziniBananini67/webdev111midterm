<!DOCTYPE html>
<html>
<head>
<title>Sign Up - CashPilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="register-wrapper">
<div class="register-card">

<h2>Create your CashPilot account</h2>

<form id="regForm" onsubmit="handleRegister(event)">
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirm" placeholder="Confirm Password" required>

<button class="btn-primary">Create Account</button>
</form>

<p id="success-msg" style="display:none;">Account created! You can now log in.</p>

</div>
</div>

<script>
function handleRegister(e){
e.preventDefault();
var pw=document.getElementById('password').value;
var cpw=document.getElementById('confirm').value;
if(pw!=cpw){alert('Passwords do not match');return;}
document.getElementById('success-msg').style.display='block';
}
</script>

</body>
</html>
