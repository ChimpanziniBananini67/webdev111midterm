<div class="page-header">
<h1>Transactions</h1>
<p>Record incoming payments and activity.</p>
</div>

<div class="pay-container">

<div class="card">
<div class="card-title">New Transaction</div>

<form id="payForm" onsubmit="handlePayment(event)">
<input type="text" placeholder="Reference / Invoice #" required>
<input type="number" placeholder="Amount (PHP)" required>
<input type="date" required>

<select required>
<option value="">Payment Method</option>
<option>Bank Transfer</option>
<option>GCash</option>
<option>Maya</option>
</select>

<button class="btn-primary">Confirm Transaction</button>
</form>

<div id="success-msg" style="display:none;">Transaction recorded!</div>
</div>

</div>

<script>
function handlePayment(e){
e.preventDefault();
document.getElementById('success-msg').style.display='block';
}
</script>

</body>
</html>
