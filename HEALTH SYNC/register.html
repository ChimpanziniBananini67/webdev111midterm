<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Health Sync Clinic</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to your main stylesheet -->
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">Health Sync Clinic</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="book.html">Book Appointment</a></li>
                    <li><a href="staff.html">Our Staff</a></li>
                    <li><a href="history.html">Medical History</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contactus.html">Contact Us</a></li>
                </ul>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="login-btn">Login</a>
                <a href="register.html" class="register-btn active">Register <span class="verified-badge">Verified</span></a> <!-- Mark as active -->
            </div>
        </div>
    </header>

    <main>
        <section class="register-form-section">
            <div class="container">
                <h2>Create Your Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name:</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required minlength="8">
                        <small>Must be at least 8 characters long.</small>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number:</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g., +1 555 123 4567">
                    </div>
                    <div class="form-group terms-checkbox">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">I agree to the <a href="terms.html">Terms and Conditions</a> and <a href="privacy.html">Privacy Policy</a>.</label>
                    </div>
                    <button type="submit" class="submit-btn">Register Account</button>
                </form>
                <div class="login-link">
                    <p>Already have an account? <a href="login.html">Login Here</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Health Sync Clinic. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
