<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health Sync Clinic</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to your main stylesheet -->
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">Health Sync Clinic</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="book.html">Book Appointment</a></li>
                    <li><a href="staff.html">Our Staff</a></li>
                    <li><a href="history.html">Medical History</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contactus.html">Contact Us</a></li>
                </ul>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="login-btn active">Login</a> <!-- Mark as active -->
                <a href="register.html" class="register-btn">Register <span class="verified-badge">Verified</span></a>
            </div>
        </div>
    </header>

    <main>
        <section class="login-form-section">
            <div class="container">
                <h2>Login to Your Account</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or Email:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <label for="rememberMe">Remember Me</label>
                        </div>
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
                <div class="signup-link">
                    <p>Don't have an account? <a href="register.html">Sign Up Here</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Health Sync Clinic. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
