<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LibryConnect</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-container">
            <div class="vintage-card">
                <h2><i class="fas fa-book-open"></i> LibryConnect</h2>
                <p class="subtitle">Please sign in to your account</p>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i> Library ID / Username
                        </label>
                        <input type="text" id="username" class="form-control" placeholder="Enter your ID" required>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>

                    <button type="submit" class="btn btn-library-card btn-block">
                        <i class="fas fa-sign-in-alt"></i> Enter Library
                    </button>
                </form>

                <div class="text-center">
                    Don't have a card? <a href="register.html">Register Now</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
