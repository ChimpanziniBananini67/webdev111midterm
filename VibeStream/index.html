<!DOCTYPE html>
<html>
<head>
    <title>TrapOut</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #000;
            padding: 20px;
            height: 100vh;
        }

        .sidebar h2 {
            color: #1DB954;
        }

        .sidebar p {
            color: #aaa;
            cursor: pointer;
        }

        .sidebar p:hover {
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 30px;
            padding-bottom: 140px; /* space for bottom player */
        }

        .song {
            display: flex;
            align-items: center;
            background-color: #181818;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .song:hover {
            background-color: #282828;
        }

        .cover {
            width: 60px;
            height: 60px;
            border-radius: 5px;
            margin-right: 15px;
            object-fit: cover;
        }

        /* Bottom Player */
        .player {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #181818;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .song-info {
            display: flex;
            align-items: center;
            max-width: 60%; /* leave room for controls and time */
            overflow: hidden;
        }

        .song-info div {
            overflow: hidden;
        }

        #player-title, #player-artist {
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .small-cover {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }

        .controls {
            display: flex;
            flex-shrink: 0;
            align-items: center;
            margin-right: 20px;
        }

        .controls button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin: 0 5px;
        }

        .controls button:hover {
            color: #1DB954;
        }

        #volumeSlider {
            width: 100px;
            margin-left: 5px;
        }

        #volumeIcon {
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
        }

        .time {
            white-space: nowrap;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

    
    <div class="sidebar">
        <h2>CCS Music</h2>
        <p>Home</p>
        <p>Your Library</p>
        <p>Liked Songs</p>
    </div>

    
    <div class="main">
        <h1>My Playlist</h1>

        <div class="song" onclick="selectSong('walangmakapa.mp3','hev.png','Walang Makapa','Hev Abi')">
            <img src="hev.png" class="cover">
            <div>
                <h3>Walang Makapa</h3>
                <p>Hev Abi</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('Materyal.mp3','shan.jpg','Materyal','Shantidope')">
            <img src="shan.jpg" class="cover">
            <div>
                <h3>Materyal</h3>
                <p>Shantidope</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('abaga.mp3','nio.png','ABA GINOONG NAPUPUNO NG SWAG','NIO')">
            <img src="nio.png" class="cover">
            <div>
                <h3>ABA GINOONG NAPUPUNO NG SWAG</h3>
                <p>NIO</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('MINAHALAGAD.mp3','hv.jpg','MINAHALAGAD','Because, Hev Abi')">
            <img src="hv.jpg" class="cover">
            <div>
                <h3>MINAHALAGAD</h3>
                <p>Because, Hev Abi</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('badbad.mp3','bad.jpg','badbad','Wagwan Bolo, Raf-L, DIM MAC')">
            <img src="bad.jpg" class="cover">
            <div>
                <h3>badbad</h3>
                <p>Wagwan Bolo, Raf-L, DIM MAC</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('mau.mp3','mau.jpg','Mau','Shanti Dope')">
            <img src="mau.jpg" class="cover">
            <div>
                <h3>Mau</h3>
                <p>Shanti Dope</p>
            </div>
        </div>

        <div class="song" onclick="selectSong('timogmagulo.mp3','m2m.jpg','WELCOME2TIMOGMAGULO','Hev Abi')">
            <img src="m2m.jpg" class="cover">
            <div>
                <h3>WELCOME2TIMOGMAGULO</h3>
                <p>Hev Abi</p>
            </div>
        </div>

    </div>

    
    <div class="player">
        <div class="song-info">
            <img id="player-cover" src="hev.png" class="small-cover">
            <div>
                <div id="player-title">Song Title</div>
                <div id="player-artist">Artist Name</div>
            </div>
        </div>

       <div class="controls">
    	<button onclick="prevSong()">⏮</button>
    	<button onclick="playAudio()">▶</button>
    	<button onclick="pauseAudio()">⏸</button>
    	<button onclick="nextSong()">⏭</button>
    	<span id="volumeIcon">🔊</span>
    	<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
       </div>


        <div class="time">
            <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
        </div>

        <audio id="audioPlayer"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
