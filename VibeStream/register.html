<!DOCTYPE html>
<html>
<head>
    <title>Create Account - CCS Music</title>
    <style>
        body {background: #121212; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh;}
        .box {background: #181818; padding: 40px; border-radius: 10px; text-align: center;}
        input {width: 220px; padding: 10px; margin: 10px 0;}
        button {padding: 10px 20px; background: #1DB954; border: none; color: white; cursor: pointer;}
        button:hover {background: #17a74a;}
        a {color: #1DB954;}
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>
    <form id="registerForm">
        <input type="text" id="newUsername" placeholder="Username" required><br>
        <input type="password" id="newPassword" placeholder="Password" required><br>
        <button type="submit">Register</button>
    </form>
    <p id="message"></p>
    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
