<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Events | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html">Nexus Events</a>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="tickets.html" data-nav="tickets">Tickets</a>
        <a href="venue.html" data-nav="venue">Venue</a>
        <a href="contact.html" data-nav="contact">Contact</a>
        <a href="admin-login.html" data-nav="admin">Admin</a>
      </nav>
      <button class="btn btn--ghost" type="button" data-party-toggle>Party Mode: OFF</button>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Join The Uprising</h1>

    <div class="panel">
      <p>
        Booking requests? Media passes? Want to challenge Boss Oleg?
        Send us a message before the lasers warm up.
      </p>

      <div class="form-grid" style="margin-top:1.5rem;">
        <label>
          Chaos Alias
          <input type="text" placeholder="Your legend name">
        </label>
        <label>
          Email
          <input type="email" placeholder="chaos@email.com">
        </label>
        <label>
          Your Message
          <textarea placeholder="State your intentions..."></textarea>
        </label>
        <button class="btn">Send Transmission</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p class="pill">Nexus Events · Contact</p>
      <p>© <span data-year></span> Nexus Events. All rights reserved.</p>
    </div>
  </footer>

	<script src="app.js" defer></script>
	<script src="admin.js" defer></script>
</body>
</html>
